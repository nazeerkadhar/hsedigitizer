<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>HSE Documentation Portal - LME</title>
  <style>
    :root {
      --bg: #f0f4f8; --card: #ffffff; --primary: #1e40af; --primary-light: #3b82f6;
      --accent: #0ea5e9; --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
      --shadow: 0 4px 12px rgba(0,0,0,0.06); --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%); color: var(--text); line-height: 1.5; min-height: 100vh; padding-bottom: 20px; }
    
    /* HEADER - MOBILE OPTIMIZED */
    .header { 
      background: linear-gradient(135deg, var(--primary) 0%, #1e3a8a 100%); 
      color: #fff; padding: 16px 12px; 
      display: flex; align-items: center; justify-content: center; 
      flex-wrap: wrap; gap: 10px; border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .logo-box { width: 50px; height: 50px; background: #fff; border-radius: 10px; padding: 4px; object-fit: contain; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .org-center { flex: 1; text-align: center; min-width: 0; padding: 0 4px; }
    .org-name { font-size: 13px; font-weight: 800; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.2; }
    .org-line { font-size: 9.5px; opacity: 0.9; margin: 1px 0; }
    .portal-title { text-align: center; font-size: 11px; font-weight: 600; color: var(--primary); background: #fff; padding: 6px 0; margin: 10px auto 0; max-width: 90%; border-radius: 20px; letter-spacing: 0.5px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }

    /* SEARCH */
    .search-wrap { max-width: 900px; margin: 16px auto 0; padding: 0 14px; }
    .search-box { 
      width: 100%; padding: 14px 16px; border: none; border-radius: var(--radius); 
      font-size: 15px; outline: none; background: var(--card); box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }
    .search-box:focus { box-shadow: 0 6px 16px rgba(59,130,246,0.15); }

    /* TABS - TOUCH FRIENDLY */
    .tabs { max-width: 900px; margin: 12px auto 0; padding: 0 14px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { 
      padding: 10px 16px; background: var(--card); border: 1.5px solid var(--border); 
      border-radius: 24px; cursor: pointer; font-size: 12.5px; font-weight: 600; 
      white-space: nowrap; transition: all 0.2s; color: var(--muted); min-height: 44px;
      display: flex; align-items: center;
    }
    .tab:active { transform: scale(0.96); }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 3px 8px rgba(30,64,175,0.25); }

    /* GRID - MOBILE FIRST */
    .container { max-width: 900px; margin: 16px auto; padding: 0 14px; }
    .doc-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .doc-card { 
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); 
      padding: 16px; display: flex; flex-direction: column; gap: 10px; 
      box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s;
    }
    .doc-card:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.08); }
    .doc-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; }
    .btn-view { 
      width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent) 100%); 
      color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; 
      font-size: 13px; min-height: 44px; transition: opacity 0.2s; letter-spacing: 0.3px;
    }
    .btn-view:active { opacity: 0.9; }
    .no-results { grid-column: 1 / -1; text-align: center; padding: 30px 15px; color: var(--muted); font-size: 14px; }

    .footer { text-align: center; padding: 18px 15px; font-size: 11px; color: var(--muted); margin-top: 10px; border-top: 1px solid var(--border); background: var(--card); }
    
    @media (min-width: 640px) {
      .doc-grid { grid-template-columns: repeat(2, 1fr); }
      .logo-box { width: 60px; height: 60px; }
      .org-name { font-size: 15px; }
      .org-line { font-size: 11px; }
    }
    @media (min-width: 860px) {
      .doc-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <header class="header">
    <img src="logo-left.png" alt="LME Left" class="logo-box">
    <div class="org-center">
      <div class="org-name">LINK MIDDLE EAST GENERAL CONTRACTING CO</div>
      <div class="org-line">P.O. Box: 51070, ABU DHABI - U.A.E.</div>
      <div class="org-line">Tel.: (9712) 658 8504 | FAX: (9712) 658 8505</div>
      <div class="org-line">E-mail: lmedubai@eim.ae</div>
      <div class="org-line">H.O: P. O. Box:16846 | TEL.: (9714) 881 6750</div>
    </div>
    <img src="logo-right.png" alt="LME Right" class="logo-box">
  </header>
  <div class="portal-title">HSE DOCUMENTATION PORTAL</div>

  <div class="search-wrap">
    <input type="text" id="search" class="search-box" placeholder="🔍 Search documents...">
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-cat="all">📋 All</button>
    <button class="tab" data-cat="policy">📜 Policies</button>
    <button class="tab" data-cat="inspection">🔍 Inspections</button>
    <button class="tab" data-cat="training">🎓 Training</button>
    <button class="tab" data-cat="incident">🚨 Incidents</button>
    <button class="tab" data-cat="report">📊 Reports</button>
    <button class="tab" data-cat="procedure">📁 Plans & Procedures</button>
  </nav>

  <main class="container">
    <div id="doc-grid" class="doc-grid"></div>
  </main>

  <footer class="footer">© 2026 LINK MIDDLE EAST GENERAL CONTRACTING CO | HSE Compliance Portal</footer>

  <script>
    const docs = [
      { name: "IMS POLICY from IMS MANUAL LMEGCC 2020", cat: "policy" },
      { name: "ZERO HARM PHILOSOPHY", cat: "policy" },
      { name: "Roles and responsibilities", cat: "policy" },
      { name: "Mandatory PPE", cat: "policy" },
      { name: "12 GOLDEN RULES", cat: "policy" },
      { name: "LME ISO CERTIFICATIONS", cat: "policy" },
      { name: "Emergency Response Procedure", cat: "policy" },
      { name: "Emergency Response Team", cat: "policy" },
      { name: "Reporting Procedures", cat: "policy" },
      { name: "Evaluation of Legal Compliance LMEGCC", cat: "policy" },
      { name: "Plant & Vehicle inspection Checklist", cat: "inspection" },
      { name: "Fire Extinguisher Inspection Register", cat: "inspection" },
      { name: "Monthly Power Tools Inspection Log", cat: "inspection" },
      { name: "Housekeeping checklist", cat: "inspection" },
      { name: "Weekly Bus Inspection Checklist", cat: "inspection" },
      { name: "Safety in Heat Checklist", cat: "inspection" },
      { name: "Daily Pre-Commencement Excavation Checklist", cat: "inspection" },
      { name: "Monthly Lifting Gear Inspection Report", cat: "inspection" },
      { name: "Daily HSE Inspection Report", cat: "inspection" },
      { name: "HSE Monthly Audit Form", cat: "inspection" },
      { name: "Quarterly Inspection Color Code", cat: "inspection" },
      { name: "Cleaning Log Sheet", cat: "inspection" },
      { name: "Working at Height", cat: "inspection" },
      { name: "HSE Inspection Office & Accommodation Checklist", cat: "inspection" },
      { name: "Battery Operated Tools Monthly Inspection Log", cat: "inspection" },
      { name: "Manlift Inspection Checklist", cat: "inspection" },
      { name: "Monthly HSE Coordination Meeting Attendance", cat: "training" },
      { name: "HSE Induction Attendance Sheet", cat: "training" },
      { name: "MSRA Communication Record", cat: "training" },
      { name: "Weekly HSE Training", cat: "training" },
      { name: "Tool Box Talk", cat: "training" },
      { name: "STARRT Briefing", cat: "training" },
      { name: "Confined Space Entry Log sheet", cat: "training" },
      { name: "Weekly HSE & TBT Training Records", cat: "training" },
      { name: "Heat Illness TBT", cat: "training" },
      { name: "HSE Training Matrix", cat: "training" },
      { name: "Under Ground & Over Head Services", cat: "training" },
      { name: "LME HSE Induction Slides", cat: "training" },
      { name: "Induction Sticker", cat: "training" },
      { name: "First Aid Report Form", cat: "incident" },
      { name: "Warning Letter", cat: "incident" },
      { name: "HSE Observation Summary", cat: "incident" },
      { name: "Near Miss Register", cat: "incident" },
      { name: "Accident or Incident Report", cat: "incident" },
      { name: "HSE Campaign Report", cat: "incident" },
      { name: "Leadership Tour", cat: "incident" },
      { name: "Weekly HSE Statistics Report", cat: "report" },
      { name: "Monthly HSE Report", cat: "report" },
      { name: "Annual HSE Statistics Report", cat: "report" },
      { name: "Waste Management Chart", cat: "report" },
      { name: "Man-Machine Interface", cat: "procedure" },
      { name: "Safe Operation of Vehicle, Plant & Equipment", cat: "procedure" },
      { name: "Manual Handling Safety", cat: "procedure" },
      { name: "Adverse Weather Conditions", cat: "procedure" },
      { name: "Journey Management Plan", cat: "procedure" },
      { name: "HSE Plan", cat: "procedure" },
      { name: "Annual HSE Audit Plan", cat: "procedure" },
      { name: "Emergency Annual Plan", cat: "procedure" }
    ];

    const grid = document.getElementById('doc-grid');
    const tabs = document.querySelectorAll('.tab');
    const searchInput = document.getElementById('search');
    let activeCat = 'all';

    function renderDocs() {
      const q = searchInput.value.toLowerCase();
      const filtered = docs.filter(d => (activeCat === 'all' || d.cat === activeCat) && d.name.toLowerCase().includes(q));
      grid.innerHTML = filtered.length ? filtered.map(d => `
        <div class="doc-card">
          <div class="doc-name">${d.name}</div>
          <button class="btn-view" onclick="alert('Opening: ${d.name}\\n(Ready to connect form)')">Open Form</button>
        </div>
      `).join('') : '<div class="no-results">🔍 No documents found</div>';
    }

    tabs.forEach(btn => btn.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      renderDocs();
    }));
    searchInput.addEventListener('input', renderDocs);
    renderDocs();
  </script>
</body>
</html>
